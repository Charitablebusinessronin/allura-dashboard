services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: allura-dashboard
    ports:
      - "${DASHBOARD_PORT:-3000}:80"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:13400}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - allura

networks:
  allura:
    name: allura
    external: true
